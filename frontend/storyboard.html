<style>

:root{--bg:#080706;--bg2:#0f0e0c;--bg3:#171512;--bg4:#1e1c18;--bg5:#252320;--border:#222018;--border2:#2e2c28;--border3:#3a3830;--text:#f0ebe0;--text2:#a09080;--text3:#524e48;--text4:#302e2a;--gold:#c8a84b;--gold2:#e4c872;--gold3:#f0d880;--teal:#3dbdb5;--coral:#e07860;--purple:#8878d8;--green:#68b868;--shadow:0 2px 8px rgba(0,0,0,0.6);--shadow-lg:0 8px 32px rgba(0,0,0,0.7);--radius:14px;--radius-sm:8px;--radius-lg:20px;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}html,body{height:auto;overflow-y:auto;}

.wrap{max-width:860px;margin:0 auto;padding:28px 20px 120px;display:flex;flex-direction:column;gap:24px;}

.story-box{padding:20px;font-family:'Noto Serif TC',serif;font-size:14px;color:var(--text2);line-height:2.1;border-bottom:1px solid var(--border);}

.sc-img-frame img{width:100%;height:100%;object-fit:cover;display:block;animation:fadeIn 0.3s ease;}.sc-img-frame .img-gradient{position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(to top,rgba(8,7,6,0.8),transparent);pointer-events:none;}.sc-img-frame .img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}.sc-img-frame:hover .img-overlay{opacity:1;}
.sc-expand-btn{color:white;font-size:11px;font-weight:600;background:rgba(0,0,0,0.5);padding:5px 10px;border-radius:5px;border:1px solid rgba(255,255,255,0.25);}.sc-img-controls{flex:1;display:flex;flex-direction:column;gap:6px;}.sc-ctrl-row{display:flex;gap:6px;}
.step-hint{padding:12px 14px;background:rgba(200,168,75,0.06);border:1px solid rgba(200,168,75,0.22);border-radius:var(--radius-sm);font-size:12px;color:var(--gold2);display:flex;align-items:flex-start;gap:8px;line-height:1.6;animation:cardIn 0.5s ease both;}
.style-inner{padding:16px 20px;}.style-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}.stag{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500;}
.save-actions{display:flex;gap:8px;margin-top:8px;}.save-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}.save-btn:hover{border-color:var(--gold);color:var(--gold);}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:999;display:none;align-items:center;justify-content:center;}.lightbox.open{display:flex;}.lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.8);}.lightbox-close{position:fixed;top:14px;right:16px;color:white;font-size:26px;cursor:pointer;background:none;border:none;opacity:0.7;transition:opacity 0.15s;}.lightbox-close:hover{opacity:1;}
.bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;opacity:0.45;pointer-events:none;}
.music-player{position:fixed;bottom:24px;left:24px;z-index:300;display:flex;align-items:center;gap:10px;background:rgba(15,14,12,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(200,168,75,0.2);border-radius:999px;padding:8px 14px 8px 10px;box-shadow:0 4px 24px rgba(0,0,0,0.5);transition:all 0.3s;user-select:none;}.music-player:hover{border-color:rgba(200,168,75,0.4);}
.music-mute-btn{width:32px;height:32px;border-radius:50%;background:rgba(200,168,75,0.12);border:1px solid rgba(200,168,75,0.25);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0;font-size:15px;color:var(--gold2);}.music-mute-btn:hover{background:rgba(200,168,75,0.25);transform:scale(1.08);}.music-mute-btn.muted{background:rgba(90,86,80,0.2);border-color:rgba(90,86,80,0.3);color:var(--text3);}
.music-info{display:flex;flex-direction:column;gap:1px;}.music-track{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
.music-bars{display:flex;align-items:flex-end;gap:2px;height:12px;}.music-bar{width:3px;background:var(--gold);border-radius:2px;animation:musicBar 0.8s ease-in-out infinite;}.music-bar:nth-child(1){height:6px;animation-delay:0s;}.music-bar:nth-child(2){height:10px;animation-delay:0.15s;}.music-bar:nth-child(3){height:7px;animation-delay:0.3s;}.music-bar:nth-child(4){height:12px;animation-delay:0.1s;}.music-bar:nth-child(5){height:5px;animation-delay:0.25s;}@keyframes musicBar{0%,100%{transform:scaleY(0.4);}50%{transform:scaleY(1);}}.music-bars.paused .music-bar{animation-play-state:paused;transform:scaleY(0.3);}
.music-vol-wrap{display:flex;align-items:center;gap:6px;}.music-vol-slider{-webkit-appearance:none;appearance:none;width:70px;height:3px;border-radius:2px;outline:none;cursor:pointer;background:linear-gradient(to right,var(--gold) 0%,var(--gold) 70%,rgba(90,86,80,0.4) 70%,rgba(90,86,80,0.4) 100%);transition:background 0.1s;}.music-vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--gold2);cursor:pointer;box-shadow:0 0 6px rgba(200,168,75,0.5);transition:transform 0.15s;}.music-vol-slider::-webkit-slider-thumb:hover{transform:scale(1.3);}.music-vol-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;border:none;background:var(--gold2);cursor:pointer;}
@media(max-width:600px){.music-player{bottom:80px;left:12px;padding:7px 12px 7px 8px;}.music-vol-slider{width:55px;}}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@media(max-width:600px){.wrap{padding:16px 12px 100px;}.input-card{padding:18px 16px;border-radius:16px;}.row2{grid-template-columns:1fr;gap:10px;}.bhead{padding:14px 16px;}.btitle{font-size:14px;}.bsub{display:none;}.story-box{padding:16px;}.dir-note{margin:12px 16px;}.char-panel{padding:14px;}.sc-card{border-radius:10px;}.sc-head{padding:10px 14px;}.save-actions{flex-direction:column;}}

<body>
<video class="bg-video" autoplay muted loop playsinline><source src="back.mp4" type="video/mp4"></video>
<div class="hdr">
  <div class="logo">🎬</div>
  <div class="hdr-text"><h1>超級導演分鏡系統</h1><p>AI 分鏡 × 角色一致性 × Gemini 生圖</p></div>
  <div class="hdr-right"><div class="ldot"></div></div>
</div>
<div class="gen-btn-sticky">
  <button class="gen-btn" id="gen-btn-mobile" onclick="generate()"><span>✦</span> 超級導演，開拍！</button>

      <textarea id="story" rows="5" placeholder="用幾句話說你的故事，AI 會補充細節並拆成專業分鏡。&#10;&#10;例如：一隻叫小福的米克斯狗狗，跟著主人阿明在城市裡生活。有一天阿明生病住院，小福獨自守在門口等待，感動了整個社區。"></textarea>
    </div>

        <button class="cnt" onclick="setN(this,6)">6</button><button class="cnt on" onclick="setN(this,8)">8</button><button class="cnt" onclick="setN(this,10)">10</button><button class="cnt" onclick="setN(this,12)">12</button><button class="cnt" onclick="setN(this,15)">15</button><button class="cnt" onclick="setN(this,18)">18</button><button class="cnt" onclick="setN(this,20)">20</button><button class="cnt" onclick="setN(this,24)">24</button>
      </div>
    </div>
    <div class="row2">
      <div>
        <div class="flabel">動畫風格</div>
        <select id="style">
          <option value="pixar">皮克斯動畫</option><option value="ghibli">宮崎駿吉卜力</option><option value="anime">日系溫馨動畫</option><option value="watercolor">水彩童書風</option><option value="korean">韓系療癒動畫</option><option value="cartoon">手繪卡通風</option><option value="realistic">寫實風格</option>
        </select>

          <option value="heartwarming">溫馨感動</option><option value="hopeful">充滿希望</option><option value="inspiring">振奮人心</option><option value="healing">安靜療癒</option><option value="joyful">活潑歡樂</option>
        </select>
      </div>
    </div>
    <div class="prog" id="prog"><div class="prog-bar"><div class="prog-fill"></div></div><div class="prog-text" id="prog-text">超級導演思考中...</div></div>
    <button class="gen-btn" id="gen-btn" onclick="generate()"><span>✦</span> 超級導演，開拍！</button>
    <div id="saves-wrap" class="saves-section" style="display:none;">
      <div class="flabel" style="margin-bottom:8px;">已儲存的分鏡</div>
      <div id="saves-list" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>
  </div>
  <div id="results"></div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightbox-img" src="" alt="">
</div>
<script>
var N=8;
var GEMINI_KEY=(typeof CONFIG!=="undefined")?CONFIG.GEMINI_API_KEY:"";
var GEMINI_KEY_PAID=(typeof CONFIG!=="undefined"&&CONFIG.GEMINI_API_KEY_PAID)?CONFIG.GEMINI_API_KEY_PAID:"";
var API_BASE=(typeof CONFIG!=="undefined"&&CONFIG.API_BASE)?CONFIG.API_BASE:"https://ai-director-studio-production.up.railway.app";
var selectedCharImages={};window.selectedCharImages=selectedCharImages;
var STYLES={
  pixar:{name:"皮克斯動畫",base:"Pixar 3D animation style, subsurface scattering skin, expressive character design, soft cinematic lighting, vibrant warm colors, high detail, consistent art style, emotional depth"},
  ghibli:{name:"宮崎駿吉卜力",base:"Studio Ghibli anime style, hand-drawn watercolor texture, soft earthy colors, gentle brush strokes, warm natural lighting, whimsical atmosphere, 2D cel shading"},
  anime:{name:"日系溫馨動畫",base:"Japanese anime style, pastel soft colors, clean line art, soft cel shading, warm golden light, heartwarming slice-of-life, consistent character design"},
  watercolor:{name:"水彩童書風",base:"watercolor children book illustration, soft brush texture, dreamy pastel palette, hand-painted look, gentle ink outlines, storybook aesthetic"},
  korean:{name:"韓系療癒動畫",base:"Korean webtoon animation style, clean lines, soft muted colors, cute rounded characters, cozy healing atmosphere, minimalist backgrounds"},
  cartoon:{name:"手繪卡通風",base:"2D hand-drawn cartoon animation, warm flat colors, expressive simple characters, clean bold outlines, cheerful wholesome aesthetic"},
  realistic:{name:"寫實風格",base:"RAW photo, photorealistic, shot on Sony A7R V, 85mm f/1.4 lens, shallow depth of field, bokeh background, subsurface scattering skin, pore-level skin detail, physically based rendering, cinematic color grading, Kodak Portra 400 film grain, global illumination, 8K ultra detailed, hyperrealistic, no illustration, no painting, no anime, no cartoon"}
};
var EMOTIONS={
  heartwarming:"heartwarming, touching, tender, gentle tears of joy, emotionally warm",
  hopeful:"hopeful, inspiring, uplifting, bright optimistic energy",
  inspiring:"inspiring, powerful, moving, triumphant, emotionally resonant",
  healing:"quiet, deeply healing, peaceful, soothing, calm and comforting",
  joyful:"joyful, playful, energetic, cheerful, celebratory"
};
var COLORS=[{bg:"rgba(200,168,75,0.15)",c:"#c8a84b"},{bg:"rgba(61,189,181,0.15)",c:"#3dbdb5"},{bg:"rgba(224,120,96,0.15)",c:"#e07860"},{bg:"rgba(136,120,216,0.15)",c:"#8878d8"},{bg:"rgba(104,184,104,0.15)",c:"#68b868"},{bg:"rgba(88,152,216,0.15)",c:"#5898d8"},{bg:"rgba(216,104,168,0.15)",c:"#d868a8"},{bg:"rgba(200,200,75,0.15)",c:"#c8c84b"}];
var NO_TEXT=", vertical 9:16 format, cinematic composition, dynamic scene, characters in natural poses interacting with each other, varied angles and viewpoints, no frame, no border, no title, no text overlay, no comic panel layout, no multiple panels, no caption, no watermark, no label, no subtitle, full bleed image, clean pure image";
// 角色參考圖專用：強制 9:16 內完整顯示單一角色，禁止多視角／多分格／設計稿樣式
var CHAR_NO_TEXT=", vertical 9:16 aspect ratio, single character centered in frame, full body fully visible from head to toe (or head to tail for animals), entire subject inside the canvas, generous margins around subject, NO cropping, NO cutoff, NO multiple views, NO multi-angle reference sheet, NO multiple poses, NO turnaround sheet, NO collage, NO split panels, NO tiled images, ONE single subject only, plain white seamless background, soft even studio lighting, clean isolated subject, no frame, no border, no text, no watermark, no caption, no label";
function setN(btn,n){N=n;document.querySelectorAll('.cnt').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');}
function el(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function openLightbox(src){document.getElementById("lightbox-img").src=src;document.getElementById("lightbox").classList.add("open");}
function closeLightbox(){document.getElementById("lightbox").classList.remove("open");}
function makePBox(text,accentColor){
  var box=el('div','pbox');box.textContent=text;if(accentColor)box.style.color=accentColor;
  var hint=el('span','pbox-hint');hint.textContent='點擊複製';box.appendChild(hint);
  box.addEventListener('click',function(){navigator.clipboard.writeText(text).then(function(){box.classList.add('copied');hint.textContent='已複製 ✓';setTimeout(function(){box.classList.remove('copied');hint.textContent='點擊複製';},2000);});});
  return box;
}
async function callGemini(prompt){
  var res=await fetch(API_BASE+"/api/gemini/text",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:32000,temperature:0.8}})});
  var data=await res.json();
  if(data.error)throw new Error(data.error.message);
  if(!data.candidates||!data.candidates[0])throw new Error("API 未回傳候選結果，請稍後再試");
  var cand=data.candidates[0];
  if(!cand.content)throw new Error("內容被過濾（finishReason:"+(cand.finishReason||"unknown")+"），請調整故事內容後重試");
  if(!cand.content.parts||!cand.content.parts[0])throw new Error("API 回傳結構異常（parts 為空）");
  return cand.content.parts[0].text.replace(/```json|```/g,'').trim();
}
function normalizeRefs(refArray){
  return (refArray||[]).map(function(r){if(typeof r==='string')return{base64:r,mimeType:'image/png'};return{base64:r.base64||r,mimeType:r.mimeType||'image/jpeg'};}).filter(function(r){return r.base64&&r.base64.length>100;});
}
// 把可能觸發 Gemini 安全過濾的字詞替換成中性版（避免角色生圖被擋）
function sanitizePrompt(prompt){
  if(!prompt)return prompt;
  var rules=[
    // 英文敏感詞 → 中性替代
    [/\b(hit|hitting|striking|punching|slapping|beating|kicked|kicking|whip\w*)\b/gi,'gently pushing'],
    [/\b(violent\w*|aggressive\w*|hostile\w*|attacking)\b/gi,'energetic'],
    [/\b(angry|anger|furious|enraged|wrath|rage|raging|hateful)\b/gi,'serious focused'],
    [/\b(scold\w*|rebuk\w*|yell\w*|shout\w*|cursing)\b/gi,'speaking firmly'],
    [/\b(threat\w*|menac\w*|intimidat\w*)\b/gi,'cautious'],
    [/\b(blood\w*|wound\w*|injur\w*|bruis\w*|scar\w*|bleeding)\b/gi,'weary'],
    [/\b(weapon\w*|knife|knives|gun|guns|sword|swords|blade|blades)\b/gi,'tool'],
    [/\b(fight\w*|battle|combat|brawl)\b/gi,'tense interaction'],
    [/\b(kill\w*|murder\w*|dead|death|corpse|kill\w*)\b/gi,'still'],
    [/\b(steal\w*|thief|robbery|robber|rob\b)\b/gi,'reaching for'],
    [/\b(despair|grief|miserable|tragedy|tragic)\b/gi,'emotional'],
    // 中文敏感詞
    [/打罵|毆打|打傷|揍|毆/g,'輕推'],
    [/抓住.{0,4}打/g,'制止'],
    [/血|傷口|流血|受傷|傷痕/g,'疲憊'],
    [/憤怒|生氣|怒氣|怒視/g,'認真'],
    [/兇狠|兇惡|凶|殘忍/g,'嚴肅'],
    [/責備|斥責|怒罵|大罵/g,'勸說'],
    [/恐嚇|威脅/g,'警示'],
    [/偷|搶|竊/g,'拿取'],
    [/死亡|屍體/g,'休息']
  ];
  var result=prompt;
  for(var i=0;i<rules.length;i++){result=result.replace(rules[i][0],rules[i][1]);}
  return result;
}
async function callImagen(prompt,refBase64Array){
  // 進入生圖前先清理 prompt，降低安全過濾誤殺
  prompt=sanitizePrompt(prompt);
  var parts=[];var validRefs=normalizeRefs(refBase64Array);
  if(validRefs.length>0){validRefs.forEach(function(r){parts.push({inlineData:{mimeType:r.mimeType,data:r.base64}});});parts.push({text:"=== CHARACTER VISUAL IDENTITY REFERENCE (appearance only) ===\nThe image(s) above show ONLY the visual IDENTITY of the characters.\nCOPY from reference: fur/hair color, pattern, face shape, eye color, body proportions, distinctive markings, signature accessories (collar/scarf/bib).\n\n*** CRITICAL — DO NOT COPY FROM REFERENCE ***\n- DO NOT copy the pose, body angle, or stance from reference.\n- DO NOT copy the facial expression or mood from reference (reference is neutral/happy; scene may need sad/scared/angry/tired).\n- DO NOT copy the framing, distance from camera, or composition from reference.\n- DO NOT place all characters together if scene says they are apart.\n- IGNORE the reference's pose entirely. The scene description below is the SOLE source of truth for action, pose, expression, distance, and framing.\n\n*** Scene composition rules ***\n- If scene says 'fleeing/running away/in the distance' → character must be small, far, motion-blurred, mid-stride, NOT centered and calm.\n- If scene says 'hiding behind X / peeking from shadows' → character must be partially obscured, only head/eyes visible, NOT fully revealed.\n- If scene says 'injured/weary/sad/scared' → expression must reflect that emotion, NOT the reference's neutral smile.\n- If scene says 'looking at each other from afar' → use distance and depth, do NOT bring them side by side.\n\n=== SCENE TO RENDER (this is the ONLY truth for pose/composition/emotion) ===\n"+prompt});}else{parts.push({text:prompt});}
  try{
    var res=await fetch(API_BASE+"/api/gemini/image",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:parts}],generationConfig:{responseModalities:["IMAGE","TEXT"]}})});
    var data=await res.json();
    if(data.error){console.error("主模型錯誤:",data.error.message);window.lastImageError='主模型: '+data.error.message;return await callImagenFallback(prompt,refBase64Array);}
    // 偵測安全過濾：候選結果存在但沒回圖
    if(data.candidates&&data.candidates[0]){
      var c=data.candidates[0];var fr=c.finishReason||'';
      if(fr==='SAFETY'||fr==='PROHIBITED_CONTENT'||fr==='IMAGE_SAFETY'){console.warn("被安全過濾擋下:",fr);window.lastImageError='安全過濾: '+fr+' — 已自動清理敏感字詞重試中';}
    }
    var b64=extractImageB64(data)||await callImagenFallback(prompt,refBase64Array);
    return b64?await cropTo916(b64):null;
  }catch(e){console.error("callImagen exception:",e);window.lastImageError='例外: '+e.message;var fb=await callImagenFallback(prompt,refBase64Array);return fb?await cropTo916(fb):null;}
}
async function callImagenFallback(prompt,refBase64Array){
  prompt=sanitizePrompt(prompt);
  var parts=[];var validRefs=normalizeRefs(refBase64Array);
  if(validRefs.length>0){validRefs.forEach(function(r){parts.push({inlineData:{mimeType:r.mimeType,data:r.base64}});});parts.push({text:"=== CHARACTER IDENTITY REFERENCE (copy appearance only) ===\nCopy from reference: fur/hair color, pattern, face shape, eye color, body proportions, signature accessories.\nDO NOT copy: pose, expression, distance, framing, composition. Those come ONLY from the scene below.\n\n=== SCENE TO RENDER ===\n"+prompt});}else{parts.push({text:prompt});}
  try{
    var res=await fetch(API_BASE+"/api/gemini/image-fallback",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:parts}],generationConfig:{responseModalities:["IMAGE","TEXT"]}})});
    var data=await res.json();if(data.error){console.error("備用模型錯誤:",data.error.message);return null;}
    var b64fb=extractImageB64(data);return b64fb?await cropTo916(b64fb):null;
  }catch(e){console.error("callImagenFallback exception:",e);return null;}
}
function extractImageB64(data){
  try{if(!data||!data.candidates||!data.candidates.length)return null;var cand=data.candidates[0];if(!cand||!cand.content||!cand.content.parts)return null;var ps=cand.content.parts;for(var i=0;i<ps.length;i++){if(ps[i]&&ps[i].inlineData&&ps[i].inlineData.data)return ps[i].inlineData.data;}return null;}catch(e){console.error("extractImageB64 error:",e);return null;}
}
async function cropTo916(b64){
  return new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var srcW=img.width,srcH=img.height,targetRatio=9/16,srcRatio=srcW/srcH,cropW,cropH,offsetX,offsetY;
      if(srcRatio>targetRatio){cropH=srcH;cropW=Math.round(srcH*targetRatio);offsetX=Math.round((srcW-cropW)/2);offsetY=0;}
      else{cropW=srcW;cropH=Math.round(srcW/targetRatio);offsetX=0;offsetY=Math.round((srcH-cropH)/2);}
      var canvas=document.createElement('canvas');canvas.width=cropW;canvas.height=cropH;
      canvas.getContext('2d').drawImage(img,offsetX,offsetY,cropW,cropH,0,0,cropW,cropH);
      resolve(canvas.toDataURL('image/png').split(',')[1]);
    };
    img.onerror=function(){resolve(b64);};img.src='data:image/png;base64,'+b64;
  });
}
async function analyzeUploadedImage(b64,mimeType){
  try{
    var res=await fetch(API_BASE+"/api/gemini/text",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{inlineData:{mimeType:mimeType,data:b64}},{text:"You are a character consistency expert for AI image generation. Analyze this image and output a PRECISE character description.\n\nDescribe EXACTLY:\n1. Species/type\n2. Body: size, build\n3. Fur/hair/skin: exact color names, texture, pattern\n4. Face: eye color, nose shape, ear type, distinctive markings\n5. Any unique features\n\nFormat: One dense paragraph, 80-120 words, English only. Output ONLY the description."}]}],generationConfig:{maxOutputTokens:200,temperature:0.2}})});
    var data=await res.json();if(data.error){console.warn("analyzeUploadedImage error:",data.error.message);return'';}
    if(!data.candidates||!data.candidates[0]||!data.candidates[0].content)return'';
    var parts=data.candidates[0].content.parts;for(var i=0;i<parts.length;i++){if(parts[i].text)return parts[i].text.trim();}return'';
  }catch(e){console.warn("analyzeUploadedImage exception:",e);return'';}
}

      '"video_prompt":"【導演動態咒語】英文80字以上，適合Veo/Kling。身為導演，根據image_prompt的靜態畫面，想像如何讓這張圖像電影般動起來。必須包含：①動作起點→終點（角色從哪裡動到哪裡，延續image_prompt的姿勢繼續動）②專業運鏡（選最能表達情緒的：slow push in=親密感/pull out=孤獨感/tracking=跟隨主角/crane up=宏觀視角/dolly zoom=震驚感/pan=揭示環境/handheld=真實緊張感）③光線動態變化（如：golden light shifts to shadow/spotlight follows character）④聲音提示（wind/footsteps/heartbeat/silence，供後製參考）⑤情緒收尾（結尾的情感落點），格式：[character action from pose in image_prompt] + [camera] + [light] + [sound hint] + [emotional beat]"}]}';

    async function callGeminiWithRetry(prompt,maxRetry){
      maxRetry=maxRetry||3;
      for(var attempt=0;attempt<maxRetry;attempt++){
        try{return await callGemini(prompt);}
        catch(err){
          var isHighDemand=err.message&&(err.message.indexOf('high demand')!==-1||err.message.indexOf('503')!==-1||err.message.indexOf('overloaded')!==-1||err.message.indexOf('UNAVAILABLE')!==-1);
          if(isHighDemand&&attempt<maxRetry-1){var waitSec=(attempt+1)*5;document.getElementById('prog-text').textContent='伺服器忙碌，'+waitSec+'秒後重試... ('+(attempt+1)+'/'+maxRetry+')';await new Promise(function(r){setTimeout(r,waitSec*1000);});}
          else{throw err;}
        }
      }
    }
    // 健壯解析：JSON 被截斷時嘗試救回 — 切到最後一個完整 } 並依括號堆疊順序補齊
    function safeParseJson(raw){
      try{return JSON.parse(raw);}catch(e1){
        var lastValid=raw.lastIndexOf('}');
        while(lastValid>0){
          var trial=raw.substring(0,lastValid+1);
          var stack=[],inString=false,escape=false;
          for(var i=0;i<trial.length;i++){
            var c=trial[i];
            if(escape){escape=false;continue;}
            if(c==='\\'){escape=true;continue;}
            if(c==='"'){inString=!inString;continue;}
            if(inString)continue;
            if(c==='{'||c==='[')stack.push(c);
            else if(c==='}'&&stack[stack.length-1]==='{')stack.pop();
            else if(c===']'&&stack[stack.length-1]==='[')stack.pop();
          }
          var closing='';
          for(var j=stack.length-1;j>=0;j--)closing+=(stack[j]==='{'?'}':']');
          try{return JSON.parse(trial+closing);}
          catch(e2){lastValid=raw.lastIndexOf('}',lastValid-1);}
        }
        throw e1;
      }
    }
    var raw1=await callGeminiWithRetry(p1);
    var part1=safeParseJson(raw1);
    if(!part1.scenes||part1.scenes.length<N){
      var allScenes=part1.scenes||[];var batchSize=5;
      // 多 2 次容錯，避免 AI 某批次回得不夠就漏掉場景
      var maxAttempts=Math.ceil((N-allScenes.length)/batchSize)+2;
      var attempts=0;
      while(allScenes.length<N&&attempts<maxAttempts){
        attempts++;
        var start=allScenes.length+1;
        var end=Math.min(start+batchSize-1,N);
        var count=end-start+1;
        document.getElementById('prog-text').textContent='生成分鏡 '+start+'-'+end+' / '+N+'...';
        if(allScenes.length>0){await new Promise(function(r){setTimeout(r,1500);});}
        // 把最近 3 個場景的精華傳給 AI 當上下文，確保情節延續
        var prevCtx='';
        if(allScenes.length>0){
          var summaryArr=[];var lastK=Math.min(3,allScenes.length);
          for(var pi=allScenes.length-lastK;pi<allScenes.length;pi++){
            var ps=allScenes[pi];
            summaryArr.push('第'+(pi+1)+'場景['+(ps.name||'')+']：'+(ps.action||ps.caption||''));
          }
          prevCtx='【已生成的前置場景（必須延續其劇情，不可重複內容）】\n'+summaryArr.join('\n')+'\n\n';
        }
        var p2="只輸出JSON陣列，不要其他文字。\n"+prevCtx+"故事："+part1.enhanced_story+"\n風格："+S.name+"\n情緒："+E+"\n角色："+part1.characters.map(function(c){return c.name;}).join('、')+"\n總共"+N+"個場景，現在生成第 "+start+" 到第 "+end+" 個。\n【鐵則】①每個場景必須延續上述前置場景的劇情、不可重複；②每場景要有獨特進展（時間或地點或動作或情緒至少要變化）；③id 必須從 "+start+" 連續編號到 "+end+"，不可跳號；④結局走向：第 "+N+" 場是整個故事的最終收尾；⑤image_prompt 必須以電影鏡位開頭（low angle shot/close-up/over-the-shoulder/dutch angle/wide shot/POV/extreme close-up 等），禁止連續同鏡位，依場景情緒挑最戲劇化的鏡頭。\n"+
          '[{"id":'+start+',"name":"場景名4字內","time":"'+((start-1)*5)+'-'+(start*5)+'秒","location":"地點繁中","caption":"字幕10字內繁中","action":"動作25字內繁中","lighting":"光線繁中","emotion_note":"情感繁中","characters_in_scene":["出現角色名"],"composition":"角色構圖（朝向互動）繁中","image_prompt":"英文80字以上，**必須以鏡位英文詞開頭**（low angle shot/close-up/over-the-shoulder/dutch angle/wide shot/POV/extreme close-up 等任一），結構：[shot type] of [character pose+action] in [environment], [light direction], [framing/depth detail], [lens hint]","video_prompt":"導演動態咒語英文80字以上：根據image_prompt讓場景動起來，含①角色動作延續②運鏡（push in/pull out/tracking/crane/dolly zoom/pan/handheld）③光線變化④聲音提示⑤情緒收尾"}]\n按此格式生成 '+count+' 個場景，id 從 '+start+' 連續到 '+end;
        try{
          var raw2=await callGeminiWithRetry(p2);
          var newScenes=safeParseJson(raw2);
          if(Array.isArray(newScenes)&&newScenes.length>0){
            allScenes=allScenes.concat(newScenes);
          }
        }catch(parseErr){console.error('批次解析失敗',parseErr);break;}
      }
      part1.scenes=allScenes;
    }

    // （這樣即使 AI 回的 id 亂跳或數量不對，畫面顯示也一定是 1, 2, 3...N）
    if(part1.scenes&&part1.scenes.length>0){
      if(part1.scenes.length>N)part1.scenes=part1.scenes.slice(0,N);
      part1.scenes.forEach(function(sc,i){
        sc.id=i+1;
        sc.time=(i*5)+'-'+((i+1)*5)+'秒';
      });
    }
    renderAll(part1,S,styleKey);
  }catch(e){
    document.getElementById('results').innerHTML='<div style="padding:40px;text-align:center;color:var(--coral);background:var(--bg2);border-radius:16px;border:1px solid var(--border);">生成失敗，請再試一次<br><small style="color:var(--text3);font-size:11px;">'+e.message+'</small></div>';
  }
  btn.disabled=false;btn.innerHTML='<span>&#x2736;</span> 重新開拍';
  if(btnM){btnM.disabled=false;btnM.innerHTML='<span>&#x2736;</span> 重新開拍';}
  document.getElementById('prog').style.display='none';
}

var SAVE_KEY='storyboard_saves';var currentData=null;var currentStyle=null;

  audio.addEventListener('ended',function(){loadTrack((currentTrack+1)%TRACKS);});
  audio.addEventListener('pause',function(){musicBars.classList.add('paused');});audio.addEventListener('play',function(){musicBars.classList.remove('paused');});
  function startOnInteraction(){if(audio.paused){loadTrack(currentTrack);}document.removeEventListener('click',startOnInteraction);document.removeEventListener('touchstart',startOnInteraction);}
  document.addEventListener('click',startOnInteraction);document.addEventListener('touchstart',startOnInteraction);loadTrack(0);
  window.toggleMute=function(){isMuted=!isMuted;if(isMuted){audio.volume=0;muteBtnEl.textContent='🔇';muteBtnEl.classList.add('muted');musicBars.classList.add('paused');}else{audio.volume=lastVol;muteBtnEl.textContent='🔊';muteBtnEl.classList.remove('muted');musicBars.classList.remove('paused');if(audio.paused)audio.play().catch(function(){});}};
  window.onVolChange=function(val){var v=val/100;lastVol=v;if(v===0){isMuted=true;audio.volume=0;muteBtnEl.textContent='🔇';muteBtnEl.classList.add('muted');musicBars.classList.add('paused');}else{isMuted=false;audio.volume=v;muteBtnEl.textContent=v>0.5?'🔊':'🔉';muteBtnEl.classList.remove('muted');musicBars.classList.remove('paused');if(audio.paused)audio.play().catch(function(){});}volSlider.style.background='linear-gradient(to right, var(--gold) 0%, var(--gold) '+val+'%, rgba(90,86,80,0.4) '+val+'%, rgba(90,86,80,0.4) 100%)';};
})();
</script>
</body>
</html>
